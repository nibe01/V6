# --- Universe / Scanner ---
universe_csv: "data/extended_symbols.csv"
block_size: 50
block_sleep_seconds: 1

# --- Signal Rules (Platzhalter; bauen wir als nächstes aus) ---
rules_mode: "ANY"   # ANY | ALL | MIN
min_rules_required: 1

# Regel 1: +5% in 24h
rule_1:
  enabled: true
  lookback_hours: 24
  change_pct: 5.0

# Regel 2: +3% in 1h
rule_2:
  enabled: true
  lookback_hours: 1
  change_pct: 3.0

# Platz für bis zu 5 Regeln
rule_3:
  enabled: false
  lookback_hours: 4
  change_pct: 2.0

rule_4:
  enabled: false
  lookback_hours: 12
  change_pct: 4.0

rule_5:
  enabled: false
  lookback_hours: 48
  change_pct: 8.0

# --- Risk / Execution ---
trade_usd: 1000
stop_loss_pct: 7.0
take_profit_pct: 1.3

# --- IB Settings ---
ib_host: "127.0.0.1"
ib_port: 7497
ib_client_id: 11        # Scanner client ID
ib_trader_client_id: 12  # Trader client ID (must be different from scanner)

# --- Data Settings ---
use_historical_data_only: true
bar_size: "5 mins"
what_to_show: "TRADES"
use_rth: true
